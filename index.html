<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Talk With Jamie | AI Chat</title>
  <meta name="description" content="Talk with an AI assistant styled by Jamie, with optional accounts and a clearly identified AI experience.">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#070a10">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    *{box-sizing:border-box} html,body,#app{min-height:100%;margin:0} body{font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#070a10;color:#f8fafc} button,input,textarea,select{font:inherit} button{cursor:pointer} img{display:block}.hide{display:none!important}
    :root[data-theme="light"] body{background:#eef2f7;color:#111827}.app{min-height:100vh;display:grid;grid-template-rows:auto 1fr auto;background:radial-gradient(circle at top,#111827,#070a10 55%,#05070c)}:root[data-theme="light"] .app{background:#eef2f7;color:#111827}
    .header{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:12px;padding:12px 14px;background:rgba(7,10,16,.86);border-bottom:1px solid rgba(148,163,184,.16);backdrop-filter:blur(14px);box-shadow:0 8px 30px rgba(0,0,0,.20)}:root[data-theme="light"] .header{background:rgba(255,255,255,.95);border-bottom-color:#e5e7eb;color:#111827}.avatar{width:44px;height:44px;border-radius:999px;object-fit:cover;background:#1f2937}.title{min-width:0;flex:1}.title h1{margin:0;font-size:17px;line-height:1.1}.title p{margin:3px 0 0;color:#94a3b8;font-size:12px}:root[data-theme="light"] .title p{color:#6b7280}
    .btn,.ghost,.danger{border:0;border-radius:14px;padding:11px 13px;background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;font-weight:650;transition:transform .15s ease,filter .15s ease}.ghost{background:#151b27;color:#dbeafe;border:1px solid #273348}.danger{background:#3b1118;color:#fecaca;border:1px solid #7f1d1d}.btn:hover,.ghost:hover,.danger:hover{transform:translateY(-1px);filter:brightness(1.05)}button:focus-visible,input:focus-visible,textarea:focus-visible,select:focus-visible{outline:3px solid #60a5fa;outline-offset:3px}.small{padding:8px 10px;font-size:13px}.muted{color:#94a3b8;font-size:13px;line-height:1.45}:root[data-theme="light"] .ghost{background:#eef2f7;color:#374151;border-color:#d1d5db}:root[data-theme="light"] .muted{color:#6b7280}
    .messages{overflow:auto;padding:18px 12px 122px;display:flex;flex-direction:column;gap:8px;background:radial-gradient(circle at 20% 0%,rgba(37,99,235,.14),transparent 30%),radial-gradient(circle at 85% 15%,rgba(168,85,247,.10),transparent 28%),#070a10}:root[data-theme="light"] .messages{background:#eef2f7}.row{display:flex}.row.me{justify-content:flex-end}.row.them{justify-content:flex-start}.bubble{max-width:min(82vw,520px);border-radius:20px;padding:10px 14px;box-shadow:0 3px 12px rgba(0,0,0,.08);animation:softIn .18s ease-out both;white-space:pre-wrap;line-height:1.36}.bubble.me{background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;border-bottom-right-radius:7px}.bubble.them{background:#161b25;color:#f8fafc;border:1px solid rgba(148,163,184,.13);border-bottom-left-radius:7px}:root[data-theme="light"] .bubble.them{background:#fff;color:#111827;border-color:#e5e7eb}.status{margin-top:4px;font-size:10.5px;opacity:.78;text-align:right}.typing{background:#161b25;border:1px solid rgba(148,163,184,.13);border-radius:18px;padding:12px 14px;display:flex;gap:6px}.typing span{width:8px;height:8px;border-radius:999px;background:#94a3b8;animation:bounce 1.1s infinite ease-in-out}.typing span:nth-child(2){animation-delay:.13s}.typing span:nth-child(3){animation-delay:.26s}:root[data-theme="light"] .typing{background:white;border-color:#e5e7eb}@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.45}40%{transform:translateY(-4px);opacity:1}}@keyframes softIn{from{opacity:.7;transform:translateY(4px)}to{opacity:1;transform:none}}
    .composer{position:sticky;bottom:0;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:end;padding:10px 12px calc(10px + env(safe-area-inset-bottom));background:rgba(7,10,16,.86);border-top:1px solid rgba(148,163,184,.16);backdrop-filter:blur(14px)}:root[data-theme="light"] .composer{background:rgba(255,255,255,.96);border-top-color:#e5e7eb}.composer textarea,.input,select{width:100%;border:1px solid #273348;border-radius:16px;background:#111827;color:#fff;padding:12px 14px;outline:none}.composer textarea{min-height:46px;max-height:160px;resize:none}:root[data-theme="light"] .composer textarea,:root[data-theme="light"] .input,:root[data-theme="light"] select{background:white;color:#111827;border-color:#d1d5db}.composer button{height:46px;padding-inline:18px}
    .center{min-height:100vh;display:grid;place-items:center;padding:18px;background:radial-gradient(circle at top,#111827,#070a10 60%)}.card{width:min(520px,100%);background:#111827;border:1px solid #273348;border-radius:26px;padding:20px;box-shadow:0 30px 90px rgba(0,0,0,.35);animation:softIn .22s ease-out both}.card h1{margin:0 0 8px;font-size:24px}.stack{display:grid;gap:10px;margin-top:14px}.tabs{display:flex;gap:8px;margin:14px 0}.tabs button{flex:1}.activeTab{background:linear-gradient(135deg,#2563eb,#7c3aed)!important;color:#fff!important}:root[data-theme="light"] .center{background:#eef2f7}:root[data-theme="light"] .card{background:white;border-color:#e5e7eb;color:#111827}
    .admin{min-height:100vh;display:grid;grid-template-columns:300px 1fr;background:#070a10;color:#f8fafc}.side{border-right:1px solid #1f2937;background:#0d111a;padding:14px;overflow:auto}.brand{display:flex;gap:10px;align-items:center;background:#111827;border:1px solid #273348;border-radius:18px;padding:12px;margin-bottom:12px}.brand img{width:42px;height:42px;border-radius:999px;object-fit:cover}.brand small{display:block;color:#94a3b8}.sideActions{display:grid;gap:8px;margin-bottom:12px}.list{display:grid;gap:8px}.item{width:100%;text-align:left;background:#111827;border:1px solid #273348;color:#f8fafc;border-radius:15px;padding:11px}.item.active{border-color:#60a5fa;background:#162038}.item span{display:block;font-weight:700}.item small{display:block;color:#94a3b8;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.main{display:grid;grid-template-rows:auto auto 1fr auto;min-width:0}.top{padding:16px;border-bottom:1px solid #1f2937;background:#0b1019}.top h1{margin:0;font-size:22px}.top p{margin:4px 0 0;color:#94a3b8}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;padding:14px;border-bottom:1px solid #1f2937}.grid label{font-size:13px;color:#cbd5e1;display:grid;gap:6px}.wide{grid-column:1/-1}.history{overflow:auto;padding:14px;display:flex;flex-direction:column;gap:10px}.adminBubble{max-width:900px;border-radius:16px;padding:12px 14px;background:#111827;border:1px solid #273348;white-space:pre-wrap}.adminBubble.ai{align-self:flex-end;background:#17326b}.adminBubble.user{align-self:flex-start}.tools{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.adminComposer{padding:12px;border-top:1px solid #1f2937;background:#0b1019}.adminComposer textarea{width:100%;min-height:90px;border:1px solid #273348;border-radius:16px;background:#111827;color:#fff;padding:12px}.actions{display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap}
    .errorBox{background:#3b1118;color:#fecaca;border:1px solid #7f1d1d;border-radius:16px;padding:12px;margin:10px 0;white-space:pre-wrap}.okBox{background:#10271a;color:#bbf7d0;border:1px solid #166534;border-radius:16px;padding:12px;margin:10px 0}@media(max-width:860px){.admin{grid-template-columns:1fr}.side{border-right:0;border-bottom:1px solid #1f2937}.grid{grid-template-columns:1fr 1fr}}@media(max-width:560px){.grid{grid-template-columns:1fr}.header{gap:8px}.small{font-size:12px;padding:7px 9px}.admin{font-size:15px}}
  </style>
</head>
<body>
<div id="app"><main class="center"><section class="card"><h1>Loading Talk With Jamie…</h1><p class="muted">If this stays here, refresh once.</p></section></main></div>
<script>
const app = document.getElementById('app');
const state = { setup:null, me:null, mode:'auto', publicMessages:[], adminThreads:[], activeThread:null, conversations:[], selectedConversation:null, authMode:'login', loading:false, error:'' };
const platforms=["Snapchat","Instagram","WhatsApp","Messages","Discord","TikTok","Facebook","LinkedIn","Email","Other"];
const categories=["Dating / Hinge / Tinder","Friend","Close friend","Family","Work","Uni","Random","Bot / scammer","Marketplace","Professional / LinkedIn","Other"];
const relationships=["New person","Talking stage","Friend","Close friend","Family","Manager","Coworker","Uni person","Recruiter","Stranger","Scammer / bot","Other"];
const replyShapes=["Auto","One short message","Several short bubbles","One paragraph","Warm and curious","Dry / funny","Careful / polite","Soft / flirty","Blunt but not rude"];
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function id(){return crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2)}
function newThread(name='New person'){return {id:id(),profile:{name,age:'',relationship:'New person',category:'Dating / Hinge / Tinder',platform:'Instagram',notes:'',boundaries:''},messages:[]}}
async function api(path, opts={}){const r=await fetch(path,{credentials:'include',headers:{'Content-Type':'application/json',...(opts.headers||{})},...opts});let d={};try{d=await r.json()}catch{} if(!r.ok) throw new Error(d.error||`Request failed ${r.status}`); return d}
function setTheme(t){document.documentElement.dataset.theme=t;localStorage.setItem('theme',t)}
function toggleTheme(){setTheme((localStorage.getItem('theme')||'dark')==='dark'?'light':'dark');render()}
setTheme(localStorage.getItem('theme')||'dark');
function topButtons(){return `<button class="ghost small" onclick="toggleTheme()">${(localStorage.getItem('theme')||'dark')==='dark'?'Light':'Dark'}</button>`}
function avatar(){return `<img class="avatar" src="/jamie-avatar.jpg" alt="Jamie">`}
function errorBox(){return state.error?`<div class="errorBox">${esc(state.error)}</div>`:''}
async function refreshMe(){try{state.me=await api('/api/me')}catch{state.me=null}}
async function init(){try{state.setup=await api('/api/setup-status')}catch(e){state.setup={configured:false};state.error='Could not reach setup-status function: '+e.message} await refreshMe(); render();}
function render(){try{ if(!state.setup) return renderLoading(); if(!state.setup.configured) return renderSetup(); if(state.me?.role==='admin'&&state.mode==='public') return renderPublic(); if(state.me?.role==='admin'&&state.mode==='conversations') return renderConversations(); if(state.me?.role==='admin') return renderAdmin(); if(state.me?.role==='user') return renderPublic(); return renderAuth(); }catch(e){app.innerHTML=`<main class="center"><section class="card"><h1>Frontend error</h1><div class="errorBox">${esc(e.stack||e.message)}</div><button class="btn" onclick="location.reload()">Reload</button></section></main>`}}
function renderLoading(){app.innerHTML=`<main class="center"><section class="card"><h1>Loading Talk With Jamie…</h1>${errorBox()}</section></main>`}
function renderSetup(){app.innerHTML=`<main class="center"><section class="card"><h1>First-run admin setup</h1><p class="muted">Create the private admin password. Admin username is <b>jamie</b>. Use the one-time setup token configured in Netlify.</p>${errorBox()}<form class="stack" onsubmit="setupAdmin(event)"><input class="input" id="setupToken" type="password" aria-label="One-time setup token" autocomplete="off" placeholder="One-time setup token" required><input class="input" id="p1" type="password" aria-label="Create admin password" autocomplete="new-password" placeholder="Create admin password" required><input class="input" id="p2" type="password" aria-label="Confirm admin password" autocomplete="new-password" placeholder="Confirm password" required><button class="btn">Finish setup</button></form></section></main>`}
async function setupAdmin(e){e.preventDefault();state.error='';const setupToken=document.getElementById('setupToken').value,p1=document.getElementById('p1').value,p2=document.getElementById('p2').value;if(p1.length<12){state.error='Use at least 12 characters';return renderSetup()} if(p1!==p2){state.error='Passwords do not match';return renderSetup()} try{await api('/api/setup',{method:'POST',body:JSON.stringify({setupToken,password:p1})});state.setup={configured:true};await refreshMe();render()}catch(e){state.error=e.message;renderSetup()}}
function renderAuth(){app.innerHTML=`<main class="app"><header class="header">${avatar()}<div class="title"><h1>Jamie</h1><p>AI Jamie chat</p></div>${topButtons()}</header><section class="messages"><div class="row them"><div class="bubble them">Hey</div></div><div class="row them"><div class="bubble them">Make an account to keep the chat, or continue as a guest</div></div><div class="card"><div class="tabs"><button class="ghost ${state.authMode==='login'?'activeTab':''}" onclick="state.authMode='login';renderAuth()">Log in</button><button class="ghost ${state.authMode==='register'?'activeTab':''}" onclick="state.authMode='register';renderAuth()">Create account</button></div>${errorBox()}<form class="stack" onsubmit="authSubmit(event)"><input class="input" id="u" aria-label="Username" placeholder="Username" autocomplete="username" autocapitalize="none" required><input class="input" id="pw" type="password" aria-label="Password" placeholder="Password" autocomplete="${state.authMode==='login'?'current-password':'new-password'}" required><button class="btn">${state.authMode==='login'?'Log in':'Create account'}</button></form><button class="ghost" style="width:100%;margin-top:10px" onclick="guestLogin()">Continue as guest</button><p class="muted">This is an AI, not human Jamie. Chats are stored and may be reviewed by the administrator. Do not share sensitive information.</p></div></section></main>`}
async function authSubmit(e){e.preventDefault();state.error='';try{await api(state.authMode==='login'?'/api/login':'/api/register',{method:'POST',body:JSON.stringify({username:document.getElementById('u').value,password:document.getElementById('pw').value})});await refreshMe();await loadPublic();render()}catch(e){state.error=e.message;renderAuth()}}
async function guestLogin(){state.error='';try{await api('/api/guest-login',{method:'POST',body:'{}'});await refreshMe();await loadPublic();render()}catch(e){state.error=e.message;renderAuth()}}
async function logout(){try{await api('/api/logout',{method:'POST'})}catch{} state.me=null;state.mode='auto';state.publicMessages=[];render()}
async function loadPublic(){try{const d=await api('/api/public-thread');state.publicMessages=d.messages||[]}catch(e){state.error=e.message}}
function messageRows(){const msgs=state.publicMessages||[];let html='';if(!msgs.length){html+=`<div class="row them"><div class="bubble them">Hey</div></div><div class="row them"><div class="bubble them">This is AI Jamie btw, just so it’s clear</div></div>`} for(const m of msgs){html+=`<div class="row ${m.role==='user'?'me':'them'}"><div class="bubble ${m.role==='user'?'me':'them'}">${esc(m.text)}${m.status?`<div class="status">${esc(m.status)}</div>`:''}</div></div>`} if(state.loading) html+=`<div class="row them"><div class="typing"><span></span><span></span><span></span></div></div>`;return html}
function renderPublic(){app.innerHTML=`<main class="app"><header class="header">${avatar()}<div class="title"><h1>Jamie</h1><p>${state.loading?'typing…':'AI Jamie · online'}</p></div>${topButtons()}${state.me?.role==='admin'?`<button class="ghost small" onclick="state.mode='admin';render()">Admin</button>`:''}<button class="ghost small" onclick="logout()">Log out</button></header><section class="messages" id="msgs" aria-live="polite">${messageRows()}</section><footer class="composer"><textarea id="msg" aria-label="Message AI Jamie" placeholder="Message..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendPublic()}"></textarea><button class="btn" onclick="sendPublic()" ${state.loading?'disabled':''}>Send</button></footer></main>`;setTimeout(()=>{const m=document.getElementById('msgs');if(m)m.scrollTop=m.scrollHeight},0)}
async function sendPublic(){const el=document.getElementById('msg');const text=(el?.value||'').trim();if(!text||state.loading)return;state.publicMessages.push({role:'user',text,status:'Sent'});if(el)el.value='';state.loading=true;renderPublic();setTimeout(()=>{const last=state.publicMessages[state.publicMessages.length-1];if(last)last.status='Delivered';renderPublic()},300);try{const d=await api('/api/public-chat',{method:'POST',body:JSON.stringify({message:text})});const last=state.publicMessages[state.publicMessages.length-1];if(last)last.status='Read';state.publicMessages.push({role:'assistant',text:d.reply||''});}catch(e){state.publicMessages.push({role:'assistant',text:'Sorry something went wrong there'});state.error=e.message}finally{state.loading=false;renderPublic()}}
async function loadAdminThreads(){try{const d=await api('/api/admin-contacts');state.adminThreads=d.threads?.length?d.threads:[newThread()];state.activeThread=state.adminThreads[0]?.id}catch(e){state.error=e.message;state.adminThreads=[newThread()];state.activeThread=state.adminThreads[0].id}}
function activeThread(){return state.adminThreads.find(t=>t.id===state.activeThread)||state.adminThreads[0]}
function renderAdmin(){if(!state.adminThreads.length){loadAdminThreads().then(render);return renderLoading()}const t=activeThread();app.innerHTML=`<main class="admin"><aside class="side"><div class="brand"><img class="avatar" src="/jamie-avatar.jpg" alt=""><div><b>Jamie Admin</b><small>${esc(state.me.username)}</small></div></div><div class="sideActions"><button class="btn" onclick="newAdminThread()">+ New</button><button class="ghost" onclick="saveAdmin()">Save</button><button class="ghost" onclick="state.mode='public';loadPublic().then(render)">Chat as Jamie</button><button class="ghost" onclick="state.mode='conversations';loadConversations().then(render)">Conversations</button><button class="ghost" onclick="logout()">Lock</button>${topButtons()}</div><div class="list">${state.adminThreads.map(x=>`<button class="item ${x.id===state.activeThread?'active':''}" onclick="state.activeThread='${x.id}';renderAdmin()"><span>${esc(x.profile.name||'Unnamed')}</span><small>${esc(x.profile.platform)} · ${esc(x.profile.relationship)}</small></button>`).join('')}</div></aside><section class="main"><header class="top"><h1>${esc(t.profile.name||'Unnamed')}</h1><p>${esc(t.profile.platform)} · ${esc(t.profile.category)}</p></header><section class="grid">${profileField('Name','name',t)}${profileField('Age','age',t)}${selectField('Platform','platform',platforms,t)}${selectField('Category','category',categories,t)}${selectField('Relationship','relationship',relationships,t)}<label>Reply shape<select id="replyShape">${replyShapes.map(x=>`<option>${x}</option>`).join('')}</select></label>${areaField('Notes','notes',t)}${areaField('Boundaries / cautions','boundaries',t)}</section><section class="history">${t.messages.length?t.messages.map(m=>`<article class="adminBubble ${m.role==='draft'?'ai':'user'}">${esc(m.text)}${m.role==='draft'?`<br><button class="ghost small" data-copy="${esc(m.text)}" onclick="copyDraft(this)">Copy</button>`:''}</article>`).join(''):'<p class="muted">Paste a message or situation and it will draft the reply in your style.</p>'}</section><footer class="adminComposer"><textarea id="draftInput" aria-label="Message or situation to draft a reply for" placeholder="Paste the message or situation here..."></textarea><div class="actions"><button class="btn" onclick="draftReply()">Draft reply</button></div></footer></section></main>`}
function profileField(label,key,t){return `<label>${label}<input class="input" value="${esc(t.profile[key])}" onchange="patchProfile('${key}',this.value)"></label>`}
function areaField(label,key,t){return `<label class="wide">${label}<textarea class="input" onchange="patchProfile('${key}',this.value)">${esc(t.profile[key]||'')}</textarea></label>`}
function selectField(label,key,opts,t){return `<label>${label}<select onchange="patchProfile('${key}',this.value)">${opts.map(o=>`<option ${o===t.profile[key]?'selected':''}>${esc(o)}</option>`).join('')}</select></label>`}
function patchProfile(k,v){activeThread().profile[k]=v}
function newAdminThread(){const t=newThread();state.adminThreads.unshift(t);state.activeThread=t.id;renderAdmin()}
function copyDraft(button){navigator.clipboard.writeText(button.dataset.copy||'')}
async function saveAdmin(){await api('/api/admin-save-contacts',{method:'POST',body:JSON.stringify({threads:state.adminThreads})});alert('Saved')}
async function draftReply(){const input=document.getElementById('draftInput').value.trim();if(!input)return;const t=activeThread();t.messages.push({role:'context',text:input});renderAdmin();try{const d=await api('/api/admin-chat',{method:'POST',body:JSON.stringify({contactId:t.id,contactProfile:t.profile,replyShape:document.getElementById('replyShape')?.value||'Auto',liveThread:t.messages,inputText:input})});t.messages.push({role:'draft',text:d.reply});renderAdmin()}catch(e){alert(e.message);renderAdmin()}}
async function loadConversations(){const d=await api('/api/admin-public-conversations');state.conversations=d.conversations||[]}
async function openConversation(u){const d=await api('/api/admin-public-conversation?username='+encodeURIComponent(u));state.selectedConversation=d.conversation;renderConversations()}
function renderConversations(){app.innerHTML=`<main class="admin"><aside class="side"><div class="brand"><img class="avatar" src="/jamie-avatar.jpg"><div><b>Public chats</b><small>${state.conversations.length} conversations</small></div></div><div class="sideActions"><button class="ghost" onclick="state.mode='admin';render()">Back</button>${topButtons()}</div><div class="list">${state.conversations.map(c=>`<button class="item ${state.selectedConversation?.username===c.username?'active':''}" onclick="openConversation('${esc(c.username)}')"><span>${esc(c.username)}</span><small>${esc(c.accountType)} · ${c.messageCount} msgs</small><small>${esc(c.lastMessage?.text||'No messages')}</small></button>`).join('')}</div></aside><section class="main"><header class="top"><h1>${esc(state.selectedConversation?.username||'Select a chat')}</h1><p>${esc(state.selectedConversation?.accountType||'Public/guest conversation viewer')}</p></header><section class="history">${state.selectedConversation?conversationHtml(state.selectedConversation):'<p class="muted">Choose a conversation on the left.</p>'}</section></section></main>`}
function conversationHtml(c){return `<div class="tools"><button class="danger" onclick="blockUser('${esc(c.username)}')">Block user</button><button class="danger" onclick="deleteChat('${esc(c.username)}')">Delete chat</button></div><div class="adminBubble"><b>Memory:</b> ${esc(c.memory||'No summary yet')}</div>${(c.messages||[]).map(m=>`<article class="adminBubble ${m.role==='assistant'?'ai':'user'}"><b>${m.role==='assistant'?'AI Jamie':'User'}:</b> ${esc(m.text)}${m.at?`<br><small>${esc(m.at)}</small>`:''}</article>`).join('')}`}
async function blockUser(u){if(!confirm('Block this user?'))return;await api('/api/admin-block-user',{method:'POST',body:JSON.stringify({username:u,reason:'blocked from admin viewer'})});alert('Blocked')}
async function deleteChat(u){if(!confirm('Delete this conversation?'))return;await api('/api/admin-delete-public-conversation',{method:'POST',body:JSON.stringify({username:u})});state.selectedConversation=null;await loadConversations();renderConversations()}
window.addEventListener('error',e=>{app.innerHTML=`<main class="center"><section class="card"><h1>Frontend error</h1><div class="errorBox">${esc(e.message)}</div><button class="btn" onclick="location.reload()">Reload</button></section></main>`});
init();
</script>
</body>
</html>
